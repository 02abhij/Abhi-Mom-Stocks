name: Diagnose AKIKO Data

on:
  workflow_dispatch:   # manual only — one-off diagnostic

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy yfinance

      - name: Run diagnostic
        run: python diagnose_akiko.py
