name: Weekly Compounder Screen

on:
  schedule:
    - cron: '0 11 * * 5'   # Every Friday at 16:30 IST = 11:00 UTC
  workflow_dispatch:         # Manual trigger anytime

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas schedule

      - name: Run compounder screen
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          SCREENER_CSV:    "Updated_claude_100_Market_Cap.csv"
        run: python compounder_screener.py --now
