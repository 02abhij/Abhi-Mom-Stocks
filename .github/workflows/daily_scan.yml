name: Daily Momentum Scanner

on:
  schedule:
    # Runs at 10:45 UTC = 4:15 PM IST, Monday to Friday
    - cron: '45 10 * * 1-5'
  workflow_dispatch:  # Allows manual trigger from GitHub website

permissions:
  contents: write   # needed to commit history/momentum_history.csv back to the repo

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas schedule requests yfinance

      - name: Run momentum scanner
        env:
          EMAIL_SENDER: "02abhij@gmail.com"
          EMAIL_RECIPIENT: "abhi@ajassoc.in"
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python scheduler.py --now

      - name: Commit history snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          git diff --cached --quiet || git commit -m "history: daily snapshot $(date -u +%F)"
          git pull --rebase origin main || true
          git push
